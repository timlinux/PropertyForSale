site_name: PropertyForSale Documentation
site_description: Premium property sales web application documentation
site_author: Tim Sutton
site_url: https://timlinux.github.io/PropertyForSale

repo_name: timlinux/PropertyForSale
repo_url: https://github.com/timlinux/PropertyForSale
edit_uri: edit/main/docs/docs/

copyright: >
  Copyright &copy; 2026 Tim Sutton. Licensed under EUPL-1.2.
  Made with :heart: by <a href="https://kartoza.com">Kartoza</a>

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: timlinux
      repo: PropertyForSale
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Browsing Properties: user-guide/browsing.md
      - 3D Tours: user-guide/3d-tours.md
      - Interactive Maps: user-guide/maps.md
  - Admin Guide:
      - Setup: admin-guide/setup.md
      - NixOS Deployment: admin-guide/nixos-deployment.md
      - Property Management: admin-guide/properties.md
      - Media Management: admin-guide/media.md
      - Analytics: admin-guide/analytics.md
      - A/B Testing: admin-guide/ab-testing.md
  - Developer Guide:
      - Architecture: developer-guide/architecture.md
      - Backend: developer-guide/backend.md
      - Frontend: developer-guide/frontend.md
      - API Reference: developer-guide/api.md
      - Database: developer-guide/database.md
      - Deployment: developer-guide/deployment.md
  - API:
      - Overview: api/overview.md
      - Authentication: api/authentication.md
      - Properties: api/properties.md
      - Media: api/media.md
      - Analytics: api/analytics.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/timlinux/PropertyForSale
    - icon: fontawesome/solid/heart
      link: https://github.com/sponsors/timlinux
  generator: false

extra_footer: |
  Made with :heart: by <a href="https://kartoza.com">Kartoza</a> |
  <a href="https://github.com/sponsors/timlinux">Donate!</a> |
  <a href="https://github.com/timlinux/PropertyForSale">GitHub</a>
